services:
  web:
    build: .
    container_name: django_firebase_app
    volumes:
      - .:/app
      - ./firebase-credentials.json:/app/firebase-credentials.json
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DJANGO_ALLOWED_HOSTS=*
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-credentials.json
    env_file:
      - .env